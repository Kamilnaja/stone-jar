<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Jar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="canvas" width="480" height="640"></canvas>
  <div id="controls">
    <button id="addBtn">+ Add Stone</button>
    <button id="removeBtn">- Remove Stone</button>
  </div>
  <div id="info">
    <span>Today: <span class="swatch" id="todaySwatch"></span><span id="todayLabel">—</span></span>
    <span id="stoneCount">0 stones</span>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
